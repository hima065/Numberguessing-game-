
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Number Guessing Game</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: linear-gradient(-45deg, #ff6b6b, #f9d342, #4ecdc4, #556270, #a18cd1);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .box {
    background: rgba(255,255,255,0.92);
    padding: 2rem 1.75rem;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,.25);
    width: 100%;
    max-width: 360px;
    text-align: center;
    backdrop-filter: blur(8px);
  }

  h1 {
    margin: 0 0 .25rem;
    font-size: 1.6rem;
    background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  p.sub {
    margin: 0 0 1.25rem;
    color: #555;
    font-size: .95rem;
  }

  input {
    width: 100%;
    padding: .75rem;
    font-size: 1.1rem;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
    outline: none;
    transition: border-color .2s;
  }

  input:focus {
    border-color: #4ecdc4;
  }

  .row {
    display: flex;
    gap: .5rem;
    margin-top: .75rem;
  }

  button {
    flex: 1;
    padding: .75rem;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .1s, filter .2s;
  }

  button:hover {
    filter: brightness(1.08);
  }

  button:active {
    transform: scale(.97);
  }

  .guess {
    background: linear-gradient(135deg, #ff6b6b, #f9d342);
  }

  .reset {
    background: linear-gradient(135deg, #4ecdc4, #556270);
  }

  #message {
    margin-top: 1rem;
    padding: .75rem;
    border-radius: 10px;
    background: #f3f4f6;
    font-weight: 600;
    min-height: 1.5em;
    color: #333;
    transition: background .3s ease;
  }

  #attempts {
    margin: .75rem 0 0;
    color: #666;
    font-size: .9rem;
  }
</style>
</head>

<body>

<div class="box">
  <h1>🎯 Guess the Number</h1>
  <p class="sub">Pick a number between 1 and 100</p>

  <input
    id="guess"
    type="number"
    min="1"
    max="100"
    placeholder="Your guess"
  />

  <div class="row">
    <button class="guess" type="button" onclick="checkGuess()">
      Guess
    </button>

    <button class="reset" type="button" onclick="startGame()">
      New Game
    </button>
  </div>

  <p id="message">Good luck! 🍀</p>
  <p id="attempts">Attempts: 0</p>
</div>

<script>
  let targetNumber;
  let attempts;

  function startGame() {
    targetNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;

    const message = document.getElementById('message');
    const input = document.getElementById('guess');

    message.textContent = 'Good luck! 🍀';
    message.style.background = '#f3f4f6';

    document.getElementById('attempts').textContent = 'Attempts: 0';

    input.value = '';
    input.disabled = false;
    input.focus();
  }

  function checkGuess() {
    const input = document.getElementById('guess');
    const message = document.getElementById('message');

    if (input.disabled) return;

    const guess = parseInt(input.value, 10);

    if (isNaN(guess) || guess < 1 || guess > 100) {
      message.textContent = '⚠️ Enter a number from 1 to 100.';
      message.style.background = '#fff3cd';
      input.focus();
      return;
    }

    attempts++;

    document.getElementById('attempts').textContent =
      'Attempts: ' + attempts;

    if (guess === targetNumber) {
      message.textContent =
        '🎉 Correct! The number was ' + targetNumber + '.';

      message.style.background = '#d1fae5';

      input.disabled = true;

    } else if (guess < targetNumber) {
      message.textContent = '📈 Too low — try higher.';
      message.style.background = '#fef3c7';

    } else {
      message.textContent = '📉 Too high — try lower.';
      message.style.background = '#fee2e2';
    }

    input.value = '';
    input.focus();
  }

  document.getElementById('guess')
    .addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        checkGuess();
      }
    });

  startGame();
</script>

</body>
</html>
